<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Management System</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='style.css') }}">
</head>
<body>
    <div class="c">
        <h1>Knowledge Management System</h1>
        
        <div class="s">
            <h2>Index Git Repository</h2>
            <form id="repo-form">
                <input type="url" id="repo-url" class="inp" placeholder="Enter public Git repository URL" required>
                <button type="submit" class="btn">Index Repo</button>
            </form>
        </div>

        <div class="s">
            <h2>Ask Questions</h2>
            <textarea id="qi" placeholder="Enter your question..." class="inp"></textarea>
            <button id="sq" class="btn">Ask</button>
        </div>

        <div class="s">
            <h2>Response</h2>
            <div id="rc" class="out"></div>
        </div>
    </div>

    <script>
        document.getElementById('repo-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            let repoUrl = document.getElementById('repo-url').value.trim();

            try {
                let r = await fetch('/ingest-repo', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ repo_url: repoUrl })
                });
                let d = await r.json();
                if (!r.ok) {
                    alert(d.detail || 'Failed to index repository');
                    return;
                }
                alert(`${d.message}. Indexed ${d.files_indexed} files into ${d.chunks_processed} chunks.`);
            } catch (x) {
                alert('Error indexing repository');
            }
        });

        document.getElementById('sq').addEventListener('click', async () => {
            let q = document.getElementById('qi').value;
            
            try {
                let r = await fetch('/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question: q })
                });
                let d = await r.json();
                let rc = document.getElementById('rc');
                if (!r.ok) {
                    rc.textContent = d.detail || 'Unable to answer question';
                    return;
                }

                let h = `<div><strong>Answer:</strong><br>${d.response || ''}</div>`;
                if (d.citations && d.citations.length) {
                    h += '<hr><div><strong>Sources:</strong><ul>';
                    for (let c of d.citations) {
                        let p = c.page !== undefined && c.page !== null ? c.page : 'N/A';
                        h += `<li><strong>${c.source}</strong> (page: ${p})<br><small>${c.snippet || ''}</small></li>`;
                    }
                    h += '</ul></div>';
                }
                rc.innerHTML = h;
            } catch (x) {
                alert('Error');
            }
        });
    </script>
</body>
</html>
