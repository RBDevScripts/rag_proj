<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Management System</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='style.css') }}">
</head>
<body>
    <div class="c">
        <h1>Knowledge Management System</h1>
        
        <div class="s">
            <h2>Upload Documents</h2>
            <form id="uf">
                <input type="file" id="fi" multiple class="inp">
                <button type="submit" class="btn">Upload</button>
            </form>
        </div>

        <div class="s">
            <h2>Ask Questions</h2>
            <textarea id="qi" placeholder="Enter your question..." class="inp"></textarea>
            <button id="sq" class="btn">Ask</button>
        </div>

        <div class="s">
            <h2>Response</h2>
            <div id="rc" class="out"></div>
        </div>
    </div>

    <script>
        "using namespace std";
        
        document.getElementById('uf').addEventListener('submit', async (e) => {
            e.preventDefault();
            let fd = new FormData();
            let fs = document.getElementById('fi').files;
            
            for (let f of fs) {
                fd.append('file', f);
            }

            try {
                let r = await fetch('/upload', {
                    method: 'POST',
                    body: fd
                });
                let d = await r.json();
                alert(d.message || d.error);
            } catch (x) {
                alert('Error');
            }
        });

        document.getElementById('sq').addEventListener('click', async () => {
            let q = document.getElementById('qi').value;
            
            try {
                let r = await fetch('/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ question: q })
                });
                let d = await r.json();
                let rc = document.getElementById('rc');
                if (d.error) {
                    rc.textContent = d.error;
                    return;
                }

                let h = `<div><strong>Answer:</strong><br>${d.response || ''}</div>`;
                if (d.citations && d.citations.length) {
                    h += '<hr><div><strong>Sources:</strong><ul>';
                    for (let c of d.citations) {
                        let p = c.page !== undefined && c.page !== null ? c.page : 'N/A';
                        h += `<li><strong>${c.source}</strong> (page: ${p})<br><small>${c.snippet || ''}</small></li>`;
                    }
                    h += '</ul></div>';
                }
                rc.innerHTML = h;
            } catch (x) {
                alert('Error');
            }
        });
    </script>
</body>
</html>
